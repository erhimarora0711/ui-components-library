<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accordion Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="accordion">

    <div class="accordion__item">
      <button class="accordion__header">What is AEM?</button>
      <div class="accordion__content">
        <p>AEM is a CMS used for enterprise websites.</p>
      </div>
    </div>

    <div class="accordion__item">
      <button class="accordion__header">What is CQ5?</button>
      <div class="accordion__content">
        <p>CQ5 is the earlier version of AEM.</p>
      </div>
    </div>

    <div class="accordion__item">
      <button class="accordion__header">What do you do?</button>
      <div class="accordion__content">
        <p>I build scalable component-based UI systems.</p>
      </div>
    </div>

  </section>

  <script src="myScript.js"></script>
</body>
</html>
